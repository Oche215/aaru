{% block script %}
<script>
    function resizeIframe() {
      try {
        const iframe = document.getElementById('myIframe');
        const doc = iframe.contentWindow.document;

        // Adjust height and width based on content
        iframe.style.height = doc.documentElement.scrollHeight + 'px';
        iframe.style.width = doc.documentElement.scrollWidth + 'px';
      } catch (error) {
        console.error("Unable to access iframe content (possible cross-origin issue).", error);
      }
    }

    // Resize when iframe loads
    document.getElementById('myIframe').addEventListener('load', resizeIframe);
</script>

<script>
    // Load YouTube IFrame API
    let tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    let players = [];

    // Called by YouTube API when ready
    function onYouTubeIframeAPIReady() {
      document.querySelectorAll('iframe').forEach((iframe, index) => {
        players[index] = new YT.Player(iframe, {
          events: {
            'onStateChange': (event) => handleStateChange(event, index)
          }
        });
      });
    }

    function handleStateChange(event, activeIndex) {
      if (event.data === YT.PlayerState.PLAYING) {
        // Enable controls for the active video
        players[activeIndex].setOption('playerVars', { controls: 1 });

        // Pause and disable controls for all other videos
        players.forEach((player, i) => {
          if (i !== activeIndex) {
            player.pauseVideo();
            player.setOption('playerVars', { controls: 0 });
          }
        });
      }
    }
</script>
